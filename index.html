<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zk "melhor" aluno</title>
    <style>
        header {
            background-color: rgb(0, 242, 255);
            color: azure;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid #000000;
            padding: 16px;
        }
        main {
           background-color: azure;
            color: darkred;
            text-align: center;
            margin: 0 auto;
   
        }
        img {
            width: 180px;
            height: 180px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Eae meu bacano</h1>
        
    </header>
    <main>
        <img src="post1.png" alt="icone de computador">
       
        <div>
            <h2>Meu primeiro post</h2>
            <p>editado por Sr. bacanudo</p>
            <p>Boas-vindas ao meu blog! Aqui vou compartilhar sobre tecnologia e computação</p>
            <button>❤️ <span>0</span></button>
            <button>🤓​ <span>0</span></button>
        </div>

    </main>
</body>

<script>
    const botoes = document.querySelectorAll("button");
    botoes.forEach(function(botao){
       botao.addEventListener("click", botaoClicado);

    function botaoClicado () {
        console.log("fui clicado");
        let texto = botao.querySelector("span");
        texto.textContent++;
    }
    }); 
</script>

</html>
